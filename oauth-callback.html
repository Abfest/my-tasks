<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Connecting…</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0c0e16;color:#e2e6f3;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;text-align:center;padding:20px;
  }
  .card{
    background:#13161f;border:1.5px solid #252a3d;
    border-radius:16px;padding:36px 32px;max-width:340px;width:100%;
  }
  .icon{font-size:40px;margin-bottom:16px;}
  h2{font-size:18px;font-weight:700;margin-bottom:8px;}
  p{font-size:13px;color:#5a6280;line-height:1.6;}
  .ok{border-color:rgba(52,211,153,.4);}
  .ok h2{color:#34d399;}
  .err{border-color:rgba(248,113,113,.4);}
  .err h2{color:#f87171;}
  .spinner{
    width:32px;height:32px;border:3px solid #252a3d;
    border-top-color:#5b7cfa;border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <h2>Connecting to Google…</h2>
  <p>Completing authorisation. This window will close automatically.</p>
</div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const error  = params.get('error');
  const card   = document.getElementById('card');

  if(error){
    card.className = 'card err';
    card.innerHTML = `<div class="icon">✕</div><h2>Authorisation denied</h2><p>${error}</p>`;
    if(window.opener) window.opener.postMessage({type:'gcal_oauth',error},window.location.origin);
    setTimeout(()=>window.close(), 2500);
    return;
  }

  if(code && state){
    card.className = 'card ok';
    card.innerHTML = `<div class="icon">🗓</div><h2>Connected!</h2><p>Finishing setup — this window will close shortly.</p>`;
    if(window.opener){
      window.opener.postMessage({type:'gcal_oauth',code,state},window.location.origin);
    }
    setTimeout(()=>window.close(), 1500);
    return;
  }

  card.className = 'card err';
  card.innerHTML = `<div class="icon">⚠</div><h2>Something went wrong</h2><p>No authorisation code received. Please try again.</p>`;
  setTimeout(()=>window.close(), 3000);
})();
</script>
</body>
</html>
