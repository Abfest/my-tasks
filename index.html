<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TaskFlow</title>
<meta name="theme-color" content="#0c0e16"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0e16;--s1:#13161f;--s2:#1a1e2e;--s3:#1f2438;
  --b1:#222640;--b2:#2e3450;--b3:#3d4465;
  --text:#e2e6f3;--muted:#5a6280;--faint:#2e3450;
  --accent:#5b7cfa;--a2:#7c9dff;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;--sky:#38bdf8;
  --r:11px;--r2:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 45% at 15% 5%,rgba(91,124,250,.08) 0%,transparent 60%),
             radial-gradient(ellipse 55% 40% at 85% 90%,rgba(56,189,248,.05) 0%,transparent 60%);}
/* HEADER */
.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.03em;}
.logo span{background:linear-gradient(135deg,var(--accent),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.gcal-pill{display:flex;align-items:center;gap:6px;background:var(--s2);border:1.5px solid var(--b2);border-radius:50px;padding:6px 13px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap;user-select:none;}
.gcal-pill:hover{border-color:var(--accent);}
.gcal-pill.conn{border-color:rgba(52,211,153,.4);color:var(--green);}
.gcal-dot{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:all .3s;flex-shrink:0;}
.gcal-dot.on{background:var(--green);box-shadow:0 0 7px rgba(52,211,153,.7);}
/* TABS */
.tabs{position:relative;z-index:10;display:flex;gap:2px;padding:12px 18px 0;flex-shrink:0;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 16px;border-radius:10px 10px 0 0;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid transparent;border-bottom:none;color:var(--muted);background:transparent;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--text);background:var(--s1);}
.tab.on{color:var(--text);background:var(--s1);border-color:var(--b1);font-weight:600;}
/* CONTENT */
.content{position:relative;z-index:1;flex:1;overflow:hidden;background:var(--s1);border-top:1.5px solid var(--b1);margin:0 18px 18px;}
.pane{display:none;height:100%;overflow-y:auto;padding:20px;}
.pane.on{display:block;}
.pane::-webkit-scrollbar{width:4px;}
.pane::-webkit-scrollbar-track{background:transparent;}
.pane::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
/* SHARED */
.sep{height:1px;background:var(--b1);margin:13px 0;}
.row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.chip{padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--b1);color:var(--muted);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;}
.chip:hover{border-color:var(--accent);color:var(--a2);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.pri{padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;border:1.5px solid transparent;background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;}
.pri.hi{color:var(--red);border-color:#3a2020;}
.pri.hi.on,.pri.hi:hover{background:#2e1a1a;border-color:var(--red);}
.pri.med{color:var(--yellow);border-color:var(--yellow);background:#2a2010;}
.pri.lo{color:var(--sky);border-color:#1e2a3a;}
.pri.lo.on,.pri.lo:hover{background:#1a2535;border-color:var(--sky);}
.date-wrap{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--b1);border-radius:8px;padding:5px 9px;flex:1;transition:border-color .15s;}
.date-wrap:focus-within{border-color:var(--accent);}
.date-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;}
input[type=date]{background:transparent;border:none;outline:none;color:#8892b0;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;cursor:pointer;color-scheme:dark;padding:0;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.35);cursor:pointer;}
input[type=time]{background:transparent;border:none;outline:none;color:#8892b0;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;cursor:pointer;color-scheme:dark;padding:0;}
.add-btn{width:34px;height:34px;border-radius:9px;background:var(--accent);border:none;color:#fff;font-size:21px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding-bottom:1px;}
.add-btn:hover{background:var(--a2);transform:scale(1.06);}
.act{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;}
.act:hover{background:var(--s3);}
.act.sync{color:var(--accent);}
.act.sync:hover{background:rgba(91,124,250,.15);}
.act.del:hover{background:#2e1a1a;color:var(--red);}
.slbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--b1);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.nbtn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--b1);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nbtn:hover{border-color:var(--b2);color:var(--text);}
.fbtn{padding:5px 13px;border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--b1);color:var(--muted);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;}
.fbtn.on{border-color:var(--accent);color:var(--a2);background:rgba(91,124,250,.1);}
.fbtn:hover:not(.on){border-color:var(--b2);color:var(--text);}
/* TASKS */
.tinput-card{background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r2);padding:18px;margin-bottom:16px;transition:border-color .2s;}
.tinput-card:focus-within{border-color:var(--b2);}
.hint{font-size:10px;color:var(--faint);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.main-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;font-family:'Syne',sans-serif;font-weight:700;caret-color:var(--accent);margin-bottom:13px;}
.main-input::placeholder{color:var(--faint);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat{background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r);padding:11px 13px;}
.stat-v{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;line-height:1;margin-bottom:2px;}
.stat-v.blue{color:var(--a2)}.stat-v.green{color:var(--green)}.stat-v.red{color:var(--red)}.stat-v.yellow{color:var(--yellow)}
.stat-l{font-size:9.5px;color:var(--muted);font-weight:500;letter-spacing:.04em;text-transform:uppercase;}
.prog{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--sky));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.task-item{background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .2s ease;}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.task-item.hi::before{background:var(--red)}.task-item.med::before{background:var(--yellow)}.task-item.lo::before{background:var(--sky)}
.task-item:hover{border-color:var(--b2)}.task-item.done{opacity:.38}.task-item.overdue{border-color:rgba(248,113,113,.2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.chk{width:19px;height:19px;border-radius:5px;border:2px solid var(--b2);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#fff;font-size:10px;}
.chk:hover{border-color:var(--green)}.chk.on{background:var(--green);border-color:var(--green)}
.task-body{flex:1;min-width:0;}
.task-title{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:var(--text);margin-bottom:5px;line-height:1.4;word-break:break-word;}
.task-item.done .task-title{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.m-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:9px;background:rgba(91,124,250,.12);color:var(--a2);}
.m-date{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:2px;white-space:nowrap;}
.m-date.late{color:var(--red)}
.syn-badge{font-size:10px;color:var(--green);display:flex;align-items:center;gap:3px;background:rgba(52,211,153,.1);padding:2px 7px;border-radius:9px;cursor:pointer;}
.syn-badge:hover{background:rgba(52,211,153,.2)}
.task-actions{display:flex;gap:3px;align-items:center;flex-shrink:0;}
/* WEEK */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.week-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px;}
.dcol{background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r);padding:9px 7px;min-height:140px;cursor:pointer;transition:border-color .15s;position:relative;}
.dcol:hover{border-color:var(--b2)}.dcol.today{border-color:var(--accent)}.dcol.sel{border-color:var(--a2);background:rgba(91,124,250,.06)}
.dname{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;}
.dnum{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:6px;}
.dcol.today .dnum{color:var(--accent)}
.dev{font-size:9.5px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.dev.task-hi{background:rgba(248,113,113,.13);color:var(--red)}
.dev.task-med{background:rgba(251,191,36,.13);color:var(--yellow)}
.dev.task-lo{background:rgba(56,189,248,.13);color:var(--sky)}
.dev.cal-ev{background:rgba(52,211,153,.13);color:var(--green)}
.dmore{font-size:9px;color:var(--muted);padding:1px 5px;}
.dadd{position:absolute;bottom:5px;right:5px;width:18px;height:18px;border-radius:4px;background:var(--accent);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.dcol:hover .dadd{opacity:1}
.day-detail{background:var(--s2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:14px;margin-bottom:14px;}
.day-detail-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:10px;}
.ev-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;background:var(--bg);border:1.5px solid var(--b1);margin-bottom:5px;}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ev-title-t{font-size:12.5px;font-weight:500;flex:1;}
.ev-time-t{font-size:10.5px;color:var(--muted);}
/* MONTH */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.month-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.dow{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;text-align:center;padding:3px 0;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.mcell{background:var(--s2);border:1.5px solid var(--b1);border-radius:7px;min-height:72px;padding:5px;cursor:pointer;transition:border-color .15s;position:relative;}
.mcell:hover{border-color:var(--b2)}.mcell.today{border-color:var(--accent)}.mcell.other{opacity:.32}.mcell.sel{border-color:var(--a2);background:rgba(91,124,250,.07)}
.mcn{font-family:'Syne',sans-serif;font-weight:700;font-size:11.5px;margin-bottom:3px;}
.mcell.today .mcn{color:var(--accent)}
.mcev{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcev.task{background:rgba(91,124,250,.15);color:var(--a2)}.mcev.cal{background:rgba(52,211,153,.12);color:var(--green)}
.sdp{background:var(--s2);border:1.5px solid var(--b2);border-radius:var(--r2);padding:14px;margin-top:12px;}
.sdp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.sdp-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
/* PLANNER */
.top3-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:12px;}
.t3slot{display:flex;align-items:center;gap:9px;background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;}
.t3n{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--faint);width:22px;flex-shrink:0;}
.t3n.filled{color:var(--accent)}
.t3in{background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;font-weight:500;width:100%;caret-color:var(--accent);}
.t3in::placeholder{color:var(--faint)}
.t3chk{width:17px;height:17px;border-radius:4px;border:2px solid var(--b2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#fff;font-size:9px;}
.t3chk:hover{border-color:var(--green)}.t3chk.on{background:var(--green);border-color:var(--green)}
/* POMO */
.pomo{background:var(--s2);border:1.5px solid var(--b1);border-radius:var(--r2);padding:20px;text-align:center;margin-top:16px;}
.pom-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;}
.pom-modes{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.pom-mode{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--b1);color:var(--muted);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;}
.pom-mode.on{border-color:var(--accent);color:var(--accent);background:rgba(91,124,250,.1)}
.pom-ring{position:relative;width:130px;height:130px;margin:0 auto 16px;}
.pom-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.pom-ring circle{fill:none;stroke-width:7;stroke-linecap:round;}
.pom-track{stroke:var(--b1)}.pom-prog{stroke:var(--accent);transition:stroke-dashoffset .5s linear;}
.pom-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:26px;}
.pom-sub{font-size:11px;color:var(--muted);margin-bottom:13px;letter-spacing:.03em;}
.pom-btns{display:flex;gap:9px;justify-content:center;}
.pom-btn{padding:7px 20px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--b2);background:transparent;color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif;}
.pom-btn.start{background:var(--accent);border-color:var(--accent);color:#fff;}
.pom-btn.start:hover{background:var(--a2)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1.5px solid var(--b2);border-radius:20px;padding:24px;width:420px;max-width:100%;max-height:88vh;overflow-y:auto;transform:scale(.95) translateY(8px);transition:transform .2s;}
.overlay.show .modal{transform:scale(1) translateY(0)}
.mhd{display:flex;align-items:center;gap:10px;margin-bottom:17px;}
.mhd-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;}
.mf{margin-bottom:12px;}
.ml{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.mi{width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;}
.mi:focus{border-color:var(--accent)}.mi::placeholder{color:var(--faint)}
.mac{display:flex;gap:8px;margin-top:17px;}
.mbtn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--b2);font-family:'DM Sans',sans-serif;transition:all .15s;}
.mbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.mbtn.primary:hover{background:var(--a2)}
.mbtn.ghost{background:transparent;color:var(--muted)}.mbtn.ghost:hover{color:var(--text)}
.mbtn.danger{background:#2e1a1a;border-color:var(--red);color:var(--red)}
.steps{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.step{background:var(--s2);border:1.5px solid var(--b1);border-radius:9px;padding:11px 13px;display:flex;gap:9px;}
.stn{width:19px;height:19px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.stt{font-size:12.5px;font-weight:600;margin-bottom:2px;}
.std{font-size:11.5px;color:var(--muted);line-height:1.5}
.stc{background:var(--bg);border:1px solid var(--b2);border-radius:5px;padding:4px 8px;font-size:10.5px;color:var(--a2);font-family:monospace;margin-top:4px;word-break:break-all;}
/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:10px 18px;font-size:12.5px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)}.toast.warn{border-color:var(--yellow)}.toast.err{border-color:var(--red)}
@media(max-width:600px){
  .hdr{padding:12px 12px 0}.tabs{padding:10px 12px 0}.content{margin:0 12px 12px}.pane{padding:13px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .week-grid{gap:2px}.dcol{min-height:100px;padding:6px 3px}.dname{font-size:8px}.dnum{font-size:13px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Task<span>Flow</span></div>
  <button class="gcal-pill" id="gcalPill" onclick="openGCalModal()">
    <div class="gcal-dot" id="gcalDot"></div>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="opacity:.7"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 9h18" stroke="currentColor" stroke-width="1.6"/><path d="M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span id="gcalLabel">Connect Calendar</span>
  </button>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('tasks',this)">✦ Tasks</button>
  <button class="tab" onclick="switchTab('weekly',this)">📅 Weekly</button>
  <button class="tab" onclick="switchTab('monthly',this)">🗓 Monthly</button>

<script>
/* ── STATE ─────────────────────────────────── */
let tasks     = JSON.parse(localStorage.getItem('tf6_tasks') || '[]');
let calEvs    = JSON.parse(localStorage.getItem('tf6_cal')   || '[]');
let top3      = JSON.parse(localStorage.getItem('tf6_top3')  || '[{"text":"","done":false},{"text":"","done":false},{"text":"","done":false}]');
let gcal      = JSON.parse(localStorage.getItem('tf6_gcal')  || 'null');
let selTags=[],selPri='med',taskFilter='all';
let wkOff=0,moOff=0,selWkDay=null,selMoDay=null;
let pomMode='work',pomRun=false,pomRemain=1500,pomTotal=1500,pomTmr=null;
let toastTmr;
const CIRC=339.3;
const POM={work:1500,short:300,long:900};

function save(){
  localStorage.setItem('tf6_tasks',JSON.stringify(tasks));
  localStorage.setItem('tf6_cal',JSON.stringify(calEvs));
  localStorage.setItem('tf6_top3',JSON.stringify(top3));
  localStorage.setItem('tf6_gcal',JSON.stringify(gcal));
}

/* ── DATE HELPERS ─────────────────────────── */
function localStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr(){return localStr(new Date());}
function fmtD(s){
  if(!s)return'';
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-SG',{day:'numeric',month:'short'});
}
function isOverdue(t){
  if(!t.dueDate||t.done)return false;
  return new Date(t.dueDate+'T00:00:00')<new Date(new Date().toDateString());
}
function eventsOn(ds){
  const te=tasks.filter(t=>t.dueDate===ds||t.startDate===ds);
  const ce=calEvs.filter(e=>e.date===ds||(e.endDate&&e.date<=ds&&e.endDate>=ds));
  return{te,ce};
}

/* ── INIT ─────────────────────────────────── */
window.addEventListener('DOMContentLoaded',()=>{
  updateGCalUI();renderAll();renderTop3();updatePomUI();
  window.addEventListener('message',handleOAuthMsg);
});
function renderAll(){renderStats();renderTasks();renderWeekly();renderMonthly();}

/* ── TABS ─────────────────────────────────── */
function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pane-'+id).classList.add('on');
  if(id==='weekly')renderWeekly();
  if(id==='monthly')renderMonthly();
}

/* ── TAG/PRI ──────────────────────────────── */
function toggleTag(el,tag){
  if(selTags.includes(tag)){selTags=selTags.filter(t=>t!==tag);el.classList.remove('on');}
  else{selTags.push(tag);el.classList.add('on');}
}
function setPri(p){
  selPri=p;
  document.querySelectorAll('.tinput-card .pri').forEach(b=>b.classList.remove('on'));
  document.querySelector('.tinput-card .pri.'+p).classList.add('on');
}

/* ── TASK CRUD ────────────────────────────── */
function addTask(){
  const inp=document.getElementById('taskInput');
  const title=inp.value.trim();
  if(!title){inp.focus();toast('Type a task first','warn');return;}
  const sd=document.getElementById('startDate').value;
  const dd=document.getElementById('dueDate').value;
  const t={id:Date.now(),title,tags:[...selTags],priority:selPri,startDate:sd,dueDate:dd,
    done:false,synced:false,gcalId:null,calUrl:null,createdAt:new Date().toISOString()};
  tasks.unshift(t);
  if(gcal&&(dd||sd)){pushTask(t).then(()=>{save();renderAll();});}
  else{save();renderAll();}
  inp.value='';
  document.getElementById('startDate').value='';
  document.getElementById('dueDate').value='';
  selTags=[];
  document.querySelectorAll('#tagChips .chip').forEach(c=>c.classList.remove('on'));
  setPri('med');inp.focus();
  toast('✓ Task added'+(gcal&&(dd||sd)?' & synced':''),'ok');
}
function toggleDone(id){
  const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();renderAll();}
}
function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(t=>t.id!==id);save();renderAll();toast('Deleted','');
}
function setFilter(f,btn){
  taskFilter=f;
  document.querySelectorAll('#pane-tasks .fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderTasks();
}
function getFiltered(){
  const q=(document.getElementById('searchQ').value||'').toLowerCase();
  return tasks.filter(t=>{
    if(q&&!t.title.toLowerCase().includes(q)&&!t.tags.join(' ').toLowerCase().includes(q))return false;
    if(taskFilter==='active')return!t.done;
    if(taskFilter==='done')return t.done;
    if(taskFilter==='overdue')return!t.done&&isOverdue(t);
    if(taskFilter==='synced')return t.synced;
    return true;
  });
}

/* ── RENDER TASKS ─────────────────────────── */
function renderStats(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  const ov=tasks.filter(t=>isOverdue(t)).length,syn=tasks.filter(t=>t.synced).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-v blue">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v green">${done}</div><div class="stat-l">Done</div></div>
    <div class="stat"><div class="stat-v red">${ov}</div><div class="stat-l">Overdue</div></div>
    <div class="stat"><div class="stat-v yellow">${syn}</div><div class="stat-l">Synced</div></div>`;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('progFill').style.width=pct+'%';
}
function renderTasks(){
  const list=document.getElementById('taskList');
  const data=getFiltered();
  document.getElementById('taskCountLbl').textContent=data.length+' task'+(data.length!==1?'s':'');
  if(!data.length){list.innerHTML='<div class="empty"><div style="font-size:32px;opacity:.25;margin-bottom:8px">✦</div>No tasks here.</div>';return;}
  list.innerHTML=data.map(t=>`
    <div class="task-item ${t.priority} ${t.done?'done':''} ${isOverdue(t)?'overdue':''}">
      <button class="chk ${t.done?'on':''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</button>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          ${t.tags.map(g=>`<span class="m-tag">${g}</span>`).join('')}
          ${t.startDate?`<span class="m-date">▶ ${fmtD(t.startDate)}</span>`:''}
          ${t.dueDate?`<span class="m-date ${isOverdue(t)?'late':''}">⬛ ${fmtD(t.dueDate)}${isOverdue(t)?' ⚠':''}</span>`:''}
          ${t.synced?`<span class="syn-badge" onclick="if(tasks.find(t=>t.id===${t.id})?.calUrl)window.open(tasks.find(t=>t.id===${t.id}).calUrl,'_blank')">🗓</span>`:''}
        </div>
      </div>
      <div class="task-actions">
        <button class="act sync" onclick="manualSyncTask(${t.id})" title="Sync to Calendar">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1 7h14" stroke="currentColor" stroke-width="1.4"/><path d="M5 1v3M11 1v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <button class="act" onclick="openTaskEdit(${t.id})" title="Edit">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M11 2l3 3L5 14H2v-3L11 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </button>
        <button class="act del" onclick="deleteTask(${t.id})" title="Delete">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M6 4V2h4v2M5 4l.5 10h5L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>`).join('');
}

/* ── WEEKLY VIEW ──────────────────────────── */
function getWeekDays(off){
  const now=new Date();
  const mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function renderWeekly(){
  const days=getWeekDays(wkOff);
  const ts=localStr(new Date());
  const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('weekTitle').textContent=
    days[0].toLocaleDateString('en-SG',{day:'numeric',month:'short'})+' – '+
    days[6].toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('wkSync').textContent=gcal?'🟢 Calendar synced':'';
  document.getElementById('weekGrid').innerHTML=days.map((d,i)=>{
    const ds=localStr(d);
    const{te,ce}=eventsOn(ds);
    const all=[...te.slice(0,2).map(t=>({lbl:t.title,cls:'task-'+t.priority,id:t.id,type:'task'})),
               ...ce.slice(0,2).map(c=>({lbl:c.title,cls:'cal-ev',id:c.id,type:'cal'}))];
    const extra=te.length+ce.length-all.length;
    return`<div class="dcol ${ds===ts?'today':''} ${ds===selWkDay?'sel':''}" onclick="selWkDay='${ds}';renderWeekly()">
      <div class="dname">${DOW[i]}</div>
      <div class="dnum">${d.getDate()}</div>
      ${all.map(ev=>`<div class="dev ${ev.cls}" onclick="event.stopPropagation();openEvDetail('${ev.id}','${ev.type}')" title="${esc(ev.lbl)}">${esc(ev.lbl)}</div>`).join('')}
      ${extra>0?`<div class="dmore">+${extra}</div>`:''}
      <button class="dadd" onclick="event.stopPropagation();openNewEvent('${ds}')">+</button>
    </div>`;
  }).join('');
  renderWeekDetail();
}
function renderWeekDetail(){
  const c=document.getElementById('weekDetail');
  if(!selWkDay){c.innerHTML='';return;}
  const{te,ce}=eventsOn(selWkDay);
  const d=new Date(selWkDay+'T00:00:00');
  const lbl=d.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long'});
  c.innerHTML=`
    <div class="day-detail">
      <div class="day-detail-title">${lbl}</div>
      ${te.length===0&&ce.length===0?`<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">No events.</div>`:''}
      ${te.map(t=>`
        <div class="ev-row">
          <div class="ev-dot" style="background:${t.priority==='hi'?'var(--red)':t.priority==='med'?'var(--yellow)':'var(--sky)'}"></div>
          <div class="ev-title-t">${esc(t.title)}</div>
          <span class="m-tag">${t.priority}</span>
          ${t.synced?'<span class="syn-badge">🗓</span>':''}
          <button class="act sync" onclick="manualSyncTask(${t.id})" title="Sync">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1 7h14" stroke="currentColor" stroke-width="1.4"/></svg>
          </button>
        </div>`).join('')}
      ${ce.map(c=>`
        <div class="ev-row">
          <div class="ev-dot" style="background:${c.color||'var(--green)'}"></div>
          <div class="ev-title-t">${esc(c.title)}</div>
          ${c.time?`<span class="ev-time-t">${c.time}</span>`:''}
          ${c.source==='gcal'?'<span class="syn-badge">🗓</span>':''}
          <button class="act del" onclick="deleteCalEv('${c.id}')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M6 4V2h4v2M5 4l.5 10h5L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>`).join('')}
      <button class="fbtn on" style="margin-top:8px" onclick="openNewEvent('${selWkDay}')">+ Add event</button>
    </div>`;
}

/* ── MONTHLY VIEW ─────────────────────────── */
function renderMonthly(){
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth()+moOff;
  const tgt=new Date(yr,mo,1);
  const ts=localStr(new Date());
  document.getElementById('monthTitle').textContent=tgt.toLocaleDateString('en-SG',{month:'long',year:'numeric'});
  const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('dowRow').innerHTML=DOW.map(d=>`<div class="dow">${d}</div>`).join('');
  const firstDow=(tgt.getDay()+6)%7;
  const dim=new Date(tgt.getFullYear(),tgt.getMonth()+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++){const d=new Date(tgt);d.setDate(d.getDate()-(firstDow-i));cells.push({d,cur:false});}
  for(let i=1;i<=dim;i++)cells.push({d:new Date(tgt.getFullYear(),tgt.getMonth(),i),cur:true});
  while(cells.length%7!==0){const last=cells[cells.length-1].d;const d=new Date(last);d.setDate(last.getDate()+1);cells.push({d,cur:false});}
  document.getElementById('monthGrid').innerHTML=cells.map(({d,cur})=>{
    const ds=localStr(d);
    const{te,ce}=eventsOn(ds);
    const vis=[...te.slice(0,1).map(t=>({lbl:t.title,cls:'task'})),...ce.slice(0,1).map(c=>({lbl:c.title,cls:'cal'}))];
    const extra=te.length+ce.length-vis.length;
    return`<div class="mcell ${ds===ts?'today':''} ${!cur?'other':''} ${ds===selMoDay?'sel':''}" onclick="selMoDay='${ds}';renderMonthly()">
      <div class="mcn">${d.getDate()}</div>
      ${vis.map(ev=>`<div class="mcev ${ev.cls}">${esc(ev.lbl)}</div>`).join('')}
      ${extra>0?`<div style="font-size:8.5px;color:var(--muted)">+${extra}</div>`:''}
    </div>`;
  }).join('');
  renderMonthDetail();
}
function renderMonthDetail(){
  const c=document.getElementById('monthDetail');
  if(!selMoDay){c.innerHTML='';return;}
  const{te,ce}=eventsOn(selMoDay);
  const d=new Date(selMoDay+'T00:00:00');
  const lbl=d.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long'});
  c.innerHTML=`
    <div class="sdp">
      <div class="sdp-hd">
        <span class="sdp-title">${lbl}</span>
        <button class="fbtn on" onclick="openNewEvent('${selMoDay}')">+ Add</button>
      </div>
      ${te.length===0&&ce.length===0?`<div style="color:var(--muted);font-size:12.5px">No events on this day.</div>`:''}
      ${te.map(t=>`
        <div class="ev-row">
          <div class="ev-dot" style="background:${t.priority==='hi'?'var(--red)':t.priority==='med'?'var(--yellow)':'var(--sky)'}"></div>
          <div class="ev-title-t">${esc(t.title)}</div>
          ${t.synced?'<span class="syn-badge">🗓</span>':''}
          <button class="act sync" onclick="manualSyncTask(${t.id})">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1 7h14" stroke="currentColor" stroke-width="1.4"/></svg>
          </button>
        </div>`).join('')}
      ${ce.map(c=>`
        <div class="ev-row">
          <div class="ev-dot" style="background:${c.color||'var(--green)'}"></div>
          <div class="ev-title-t">${esc(c.title)}</div>
          ${c.time?`<span class="ev-time-t">${c.time}</span>`:''}
          ${c.source==='gcal'?'<span class="syn-badge">🗓</span>':''}
          <button class="act del" onclick="deleteCalEv('${c.id}')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M6 4V2h4v2M5 4l.5 10h5L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>`).join('')}
    </div>`;
}

/* ── EVENT MODAL ──────────────────────────── */
function openNewEvent(dateStr){
  document.getElementById('evModal').innerHTML=`
    <div class="mhd"><span style="font-size:22px">🗓</span><span class="mhd-title">New Event</span></div>
    <div class="mf"><div class="ml">Title</div><input class="mi" id="evTitle" placeholder="Event name…"/></div>
    <div class="mf"><div class="ml">Date</div><input type="date" class="mi" id="evDate" value="${dateStr||''}"/></div>
    <div class="mf"><div class="ml">End date</div><input type="date" class="mi" id="evEnd"/></div>
    <div style="display:flex;gap:8px">
      <div class="mf" style="flex:1"><div class="ml">Start time</div><div class="date-wrap"><input type="time" id="evTime"/></div></div>
      <div class="mf" style="flex:1"><div class="ml">End time</div><div class="date-wrap"><input type="time" id="evEndTime"/></div></div>
    </div>
    <div class="mf"><div class="ml">Color</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${['#5b7cfa','#34d399','#f87171','#fbbf24','#f472b6','#38bdf8'].map((c,i)=>
          `<div onclick="window._ec='${c}';document.querySelectorAll('.csw').forEach(s=>s.style.outline='none');this.style.outline='2px solid #fff'"
            class="csw" style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;${i===0?'outline:2px solid #fff':''}"></div>`).join('')}
      </div>

      <button class="mbtn ghost" onclick="closeEvModal()">Cancel</button>

}
function saveNewEvent(){
  const title=document.getElementById('evTitle').value.trim();
  const date=document.getElementById('evDate').value;
  if(!title||!date){toast('Title and date required','warn');return;}
  const ev={id:'ev_'+Date.now(),title,date,
    endDate:document.getElementById('evEnd').value||date,
    time:document.getElementById('evTime').value,
    endTime:document.getElementById('evEndTime').value,
    color:window._ec||'#5b7cfa',gcalId:null,calUrl:null,source:'local',synced:false};
  calEvs.push(ev);
  if(gcal){pushCalEv(ev).then(()=>{save();renderAll();});}
  else{save();renderAll();}
  closeEvModal();
  toast('Event added'+(gcal?' & synced':''),'ok');
}

/* ── PLANNER ──────────────────────────────── */
function renderTop3(){
  document.getElementById('top3Slots').innerHTML=top3.map((s,i)=>`
    <div class="t3slot">
      <div class="t3n ${s.text?'filled':''}">${i+1}</div>
      <input class="t3in" value="${esc(s.text||'')}" placeholder="Priority ${i+1}…" oninput="top3[${i}].text=this.value" onblur="save()"/>
      <button class="t3chk ${s.done?'on':''}" onclick="top3[${i}].done=!top3[${i}].done;save();renderTop3()">${s.done?'✓':''}</button>
    </div>`).join('');
}
function saveTop3(){
  document.querySelectorAll('.t3in').forEach((el,i)=>{top3[i].text=el.value;});
  save();renderTop3();toast('Top 3 saved','ok');
}

/* ── POMODORO ─────────────────────────────── */
function setPomMode(m,btn){
  if(pomRun)return;
  pomMode=m;pomRemain=pomTotal=POM[m];
  document.querySelectorAll('.pom-mode').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');updatePomUI();
}
function togglePom(){
  if(pomRun){clearInterval(pomTmr);pomRun=false;document.getElementById('pomBtn').textContent='Resume';}
  else{
    pomRun=true;document.getElementById('pomBtn').textContent='Pause';
    pomTmr=setInterval(()=>{
      pomRemain--;
      if(pomRemain<=0){
        clearInterval(pomTmr);pomRun=false;pomRemain=0;
        document.getElementById('pomBtn').textContent='Start';
        toast('⏰ Pomodoro done!','ok');
        if('vibrate'in navigator)navigator.vibrate([200,100,200]);
      }
      updatePomUI();
    },1000);
  }
}
function resetPom(){
  clearInterval(pomTmr);pomRun=false;
  pomRemain=pomTotal=POM[pomMode];
  document.getElementById('pomBtn').textContent='Start';
  updatePomUI();
}
function updatePomUI(){
  const m=String(Math.floor(pomRemain/60)).padStart(2,'0');
  const s=String(pomRemain%60).padStart(2,'0');
  document.getElementById('pomTime').textContent=`${m}:${s}`;
  document.getElementById('pomCircle').style.strokeDashoffset=CIRC*(1-pomRemain/pomTotal);
  const lbl={work:'Focus session',short:'Short break',long:'Long break'};
  document.getElementById('pomSub').textContent=pomRun?lbl[pomMode]+(pomRemain<60?' — almost done!':''):'Ready to focus';
}

/* ── GCAL ─────────────────────────────────── */
const SCOPES='https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/userinfo.email';

function updateGCalUI(){
  const dot=document.getElementById('gcalDot');
  const lbl=document.getElementById('gcalLabel');
  const pill=document.getElementById('gcalPill');
  if(gcal&&gcal.accessToken){
    dot.classList.add('on');lbl.textContent=gcal.email||'Calendar';pill.classList.add('conn');
  } else {
    dot.classList.remove('on');lbl.textContent='Connect Calendar';pill.classList.remove('conn');
  }
}
function openGCalModal(){
  const modal=document.getElementById('gcalModal');
  if(gcal&&gcal.accessToken){
    modal.innerHTML=`
      <div class="mhd"><span style="font-size:24px">🗓</span><span class="mhd-title">Google Calendar</span></div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">Connected as <strong style="color:var(--text)">${gcal.email||'your account'}</strong></div>
      <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px">
        <button class="fbtn on" onclick="syncAllPending()">↑ Sync all unsynced items</button>
        <button class="fbtn on" onclick="importFromGCal()">↓ Import from Google Calendar</button>
        <button class="fbtn" onclick="ensureFresh().then(ok=>{if(ok)toast('Auth refreshed','ok')})">⟳ Refresh auth token</button>
      </div>
      <div class="mac">
        <button class="mbtn ghost" onclick="closeGCalModal()">Close</button>
        <button class="mbtn danger" onclick="disconnectGCal()">Disconnect</button>
      </div>`;
  } else {
    modal.innerHTML=`
      <div class="mhd"><span style="font-size:24px">🗓</span><span class="mhd-title">Connect Google Calendar</span></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6">Full two-way sync — tasks & calendar events sync automatically.</div>
      <div class="steps">
        <div class="step"><div class="stn">1</div><div><div class="stt">Create OAuth credentials</div><div class="std">console.cloud.google.com → APIs & Services → Credentials → Create OAuth 2.0 Client ID (Web application)</div></div></div>
        <div class="step"><div class="stn">2</div><div><div class="stt">Add redirect URI</div><div class="stc">${window.location.origin}/oauth-callback.html</div></div></div>
        <div class="step"><div class="stn">3</div><div><div class="stt">Enable Google Calendar API</div><div class="std">APIs & Services → Library → Google Calendar API → Enable</div></div></div>
      </div>
      <div class="mf"><div class="ml">Client ID</div><input class="mi" id="cid" placeholder="xxxxxxxx.apps.googleusercontent.com" value="${gcal&&gcal.clientId||''}"/></div>
      <div class="mf"><div class="ml">Client Secret</div><input class="mi" id="csec" type="password" placeholder="GOCSPX-…" value="${gcal&&gcal.clientSecret||''}"/></div>
      <div class="mac">
        <button class="mbtn ghost" onclick="closeGCalModal()">Cancel</button>
        <button class="mbtn primary" onclick="startOAuth()">Authorize with Google</button>
      </div>`;
  }
  document.getElementById('gcalOv').classList.add('show');
}
function closeGCalModal(){document.getElementById('gcalOv').classList.remove('show');}

function genV(){const a=new Uint8Array(32);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function pkce(v){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}

async function startOAuth(){
  const cid=document.getElementById('cid').value.trim();
  const csec=document.getElementById('csec').value.trim();
  if(!cid){toast('Enter Client ID','warn');return;}
  if(!csec){toast('Enter Client Secret','warn');return;}
  gcal={clientId:cid,clientSecret:csec};save();
  const v=genV(),ch=await pkce(v);
  sessionStorage.setItem('gcv',v);
  const st=Math.random().toString(36).slice(2);
  sessionStorage.setItem('gcs',st);
  const p=new URLSearchParams({client_id:cid,redirect_uri:window.location.origin+'/oauth-callback.html',
    response_type:'code',scope:SCOPES,access_type:'offline',prompt:'consent',
    state:st,code_challenge:ch,code_challenge_method:'S256'});
  const popup=window.open('https://accounts.google.com/o/oauth2/v2/auth?'+p,'gcal','width=520,height=620,menubar=no,toolbar=no');
  if(!popup){toast('Allow popups for this site','warn');return;}
  closeGCalModal();toast('Authorize in the popup window…','');
}
function handleOAuthMsg(e){
  if(e.origin!==window.location.origin)return;
  if(!e.data||e.data.type!=='gcal_oauth')return;
  const{code,state,error}=e.data;
  if(error){toast('Auth failed: '+error,'err');return;}
  if(state!==sessionStorage.getItem('gcs')){toast('State mismatch','err');return;}
  exchangeCode(code,sessionStorage.getItem('gcv'));
}
async function exchangeCode(code,v){
  toast('Connecting to Google…','');
  try{
    const r=await fetch('https://oauth2.googleapis.com/token',{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({code,client_id:gcal.clientId,client_secret:gcal.clientSecret,
        redirect_uri:window.location.origin+'/oauth-callback.html',
        grant_type:'authorization_code',code_verifier:v})});
    const d=await r.json();
    if(d.error)throw new Error(d.error_description||d.error);
    gcal.accessToken=d.access_token;
    gcal.refreshToken=d.refresh_token||gcal.refreshToken;
    gcal.expiry=Date.now()+(d.expires_in-60)*1000;
    const ui=await(await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:'Bearer '+gcal.accessToken}})).json();
    gcal.email=ui.email;
    save();updateGCalUI();
    let cnt=0;
    for(const t of tasks){if(!t.synced&&(t.dueDate||t.startDate)){await pushTask(t);cnt++;}}
    for(const e of calEvs){if(!e.synced&&e.date){await pushCalEv(e);cnt++;}}
    save();renderAll();
    toast(`🗓 Connected as ${gcal.email}${cnt?' — '+cnt+' items synced':''}`, 'ok');
  }catch(err){toast('Connection failed: '+err.message,'err');}
}
async function ensureFresh(){
  if(!gcal)return false;
  if(gcal.expiry&&Date.now()<gcal.expiry)return true;
  if(!gcal.refreshToken){toast('Session expired — reconnect','err');gcal.accessToken=null;save();updateGCalUI();return false;}
  try{
    const r=await fetch('https://oauth2.googleapis.com/token',{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({refresh_token:gcal.refreshToken,client_id:gcal.clientId,client_secret:gcal.clientSecret,grant_type:'refresh_token'})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    gcal.accessToken=d.access_token;
    gcal.expiry=Date.now()+(d.expires_in-60)*1000;
    save();return true;
  }catch(e){toast('Token refresh failed','err');return false;}
}
function disconnectGCal(){
  if(!confirm('Disconnect Google Calendar?'))return;
  gcal=null;
  tasks.forEach(t=>{t.synced=false;t.gcalId=null;t.calUrl=null;});
  calEvs.forEach(e=>{e.synced=false;e.gcalId=null;e.calUrl=null;});
  save();updateGCalUI();renderAll();closeGCalModal();toast('Disconnected','');
}

/* ── GCAL PUSH ────────────────────────────── */
async function pushTask(task){
  const ok=await ensureFresh();if(!ok)return;
  const sd=task.startDate||task.dueDate;const ed=task.dueDate||task.startDate;if(!sd)return;
  const nxt=d=>{const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+1);return dt.toISOString().split('T')[0];};
  const body={summary:task.title,description:['Tags:'+task.tags.join(','),'Priority:'+task.priority,'From TaskFlow'].join('\n'),
    start:{date:sd},end:{date:nxt(ed)},colorId:task.priority==='hi'?'11':task.priority==='med'?'5':'7'};
  try{
    const method=task.gcalId?'PUT':'POST';
    const url=task.gcalId?`https://www.googleapis.com/calendar/v3/calendars/primary/events/${task.gcalId}`:'https://www.googleapis.com/calendar/v3/calendars/primary/events';
    const r=await fetch(url,{method,headers:{Authorization:'Bearer '+gcal.accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.status===401){gcal.expiry=0;return pushTask(task);}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const ev=await r.json();task.synced=true;task.gcalId=ev.id;task.calUrl=ev.htmlLink;
  }catch(e){console.error('Task push',e);}
}
async function pushCalEv(ev){
  const ok=await ensureFresh();if(!ok)return;
  const nxt=d=>{const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+1);return dt.toISOString().split('T')[0];};
  const start=ev.time?{dateTime:ev.date+'T'+ev.time+':00',timeZone:'Asia/Singapore'}:{date:ev.date};
  const end=ev.endTime?{dateTime:(ev.endDate||ev.date)+'T'+ev.endTime+':00',timeZone:'Asia/Singapore'}:{date:nxt(ev.endDate||ev.date)};
  const body={summary:ev.title,start,end};
  try{
    const method=ev.gcalId?'PUT':'POST';
    const url=ev.gcalId?`https://www.googleapis.com/calendar/v3/calendars/primary/events/${ev.gcalId}`:'https://www.googleapis.com/calendar/v3/calendars/primary/events';
    const r=await fetch(url,{method,headers:{Authorization:'Bearer '+gcal.accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.status===401){gcal.expiry=0;return pushCalEv(ev);}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const res=await r.json();ev.synced=true;ev.gcalId=res.id;ev.calUrl=res.htmlLink;ev.source='gcal';
  }catch(e){console.error('Cal push',e);}
}
async function manualSyncTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(!gcal){openGCalModal();return;}
  if(!t.dueDate&&!t.startDate){toast('Add a date to this task first','warn');return;}
  toast('Syncing…','');
  await pushTask(t);save();renderAll();
  toast(t.synced?'🗓 Synced to Google Calendar!':'Sync failed','ok');
}
async function syncAllPending(){
  if(!gcal){toast('Connect Calendar first','warn');return;}
  let cnt=0;
  for(const t of tasks){if(!t.synced&&(t.dueDate||t.startDate)){await pushTask(t);cnt++;}}
  for(const e of calEvs){if(!e.synced&&e.date){await pushCalEv(e);cnt++;}}
  save();renderAll();closeGCalModal();toast(`🗓 Synced ${cnt} item(s)`,'ok');
}
async function importFromGCal(){
  const ok=await ensureFresh();if(!ok)return;
  toast('Importing from Google Calendar…','');
  try{
    const now=new Date(),max=new Date(now);max.setMonth(max.getMonth()+3);
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(now.toISOString())}&timeMax=${encodeURIComponent(max.toISOString())}&singleEvents=true&maxResults=100`,
      {headers:{Authorization:'Bearer '+gcal.accessToken}});
    const d=await r.json();if(!d.items)throw new Error('No items');
    let added=0;
    for(const ev of d.items){
      if(calEvs.some(e=>e.gcalId===ev.id)||!ev.summary)continue;
      calEvs.push({id:'gcal_'+ev.id,title:ev.summary,
        date:ev.start?.date||ev.start?.dateTime?.split('T')[0]||'',
        endDate:ev.end?.date||ev.end?.dateTime?.split('T')[0]||'',
        time:ev.start?.dateTime?.split('T')[1]?.slice(0,5)||'',
        endTime:ev.end?.dateTime?.split('T')[1]?.slice(0,5)||'',
        color:'#34d399',gcalId:ev.id,calUrl:ev.htmlLink,source:'gcal',synced:true});
      added++;
    }
    save();renderAll();closeGCalModal();toast(`↓ Imported ${added} event(s)`,'ok');
  }catch(e){toast('Import failed: '+e.message,'err');}
}

/* ── HELPERS ──────────────────────────────── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
