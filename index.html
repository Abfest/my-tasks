<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>TaskFlow – Smart Task Manager</title>
<meta name="description" content="Task manager with Google Calendar sync"/>
<meta name="theme-color" content="#0c0e16"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

<style>
/* ─── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:       #0c0e16;
  --s1:       #13161f;
  --s2:       #1a1e2e;
  --s3:       #1f2438;
  --b1:       #222640;
  --b2:       #2e3450;
  --b3:       #3d4465;
  --text:     #e2e6f3;
  --muted:    #5a6280;
  --faint:    #3a3f5a;
  --accent:   #5b7cfa;
  --accent2:  #7c9dff;
  --green:    #34d399;
  --yellow:   #fbbf24;
  --red:      #f87171;
  --sky:      #38bdf8;
  --r:        12px;
  --r2:       16px;
  --shadow:   0 8px 32px rgba(0,0,0,.45);
}

/* ─── RESET ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── BG AMBIANCE ─────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 15% 5%,  rgba(91,124,250,.09) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 90%, rgba(56,189,248,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(52,211,153,.03) 0%,transparent 70%);
  z-index:0;
}

/* ─── LAYOUT ──────────────────────────────────────────── */
.app{
  position:relative;z-index:1;
  max-width:860px;margin:0 auto;
  padding:28px 20px 80px;
}

/* ─── HEADER ──────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:22px;letter-spacing:-.03em;
}
.logo span{
  background:linear-gradient(135deg,var(--accent) 0%,var(--sky) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:1px;letter-spacing:.02em;}

.header-right{display:flex;gap:10px;align-items:center;}

.gcal-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1.5px solid var(--b2);
  border-radius:50px;padding:7px 16px;
  font-size:12.5px;font-weight:500;color:var(--text);
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
  user-select:none;
}
.gcal-pill:hover{border-color:var(--accent);color:var(--accent2);}
.gcal-pill.connected{border-color:rgba(52,211,153,.4);color:var(--green);}
.gcal-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--faint);transition:all .3s;flex-shrink:0;
}
.gcal-dot.on{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.6);}
.gcal-icon{flex-shrink:0;opacity:.7;}
.gcal-label{transition:color .2s;}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--sky));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
  display:none;
}
.user-avatar.show{display:flex;}

/* ─── STATS ROW ───────────────────────────────────────── */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:24px;
}
.stat{
  background:var(--s1);border:1.5px solid var(--b1);
  border-radius:var(--r);padding:14px 16px;
  transition:border-color .2s;
}
.stat:hover{border-color:var(--b2);}
.stat-val{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:26px;line-height:1;margin-bottom:4px;
}
.stat-val.blue{color:var(--accent2);}
.stat-val.green{color:var(--green);}
.stat-val.yellow{color:var(--yellow);}
.stat-val.red{color:var(--red);}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.04em;text-transform:uppercase;}

/* ─── INPUT CARD ──────────────────────────────────────── */
.input-card{
  background:var(--s1);border:1.5px solid var(--b1);
  border-radius:var(--r2);padding:22px;
  margin-bottom:22px;transition:border-color .2s;
  box-shadow:var(--shadow);
}
.input-card:focus-within{border-color:var(--b2);}
.input-hint{
  font-size:10.5px;color:var(--faint);font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:11px;
}

.task-input{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-size:17px;font-family:'Syne',sans-serif;
  font-weight:700;caret-color:var(--accent);margin-bottom:16px;
  line-height:1.3;
}
.task-input::placeholder{color:var(--faint);font-weight:700;}

.chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.chip{
  padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--b1);color:var(--muted);
  background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.chip:hover{border-color:var(--accent);color:var(--accent2);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.sep{height:1px;background:var(--b1);margin:14px 0;}

.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.pri{
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid transparent;background:transparent;
  transition:all .15s;font-family:'DM Sans',sans-serif;
}
.pri.hi{color:var(--red);border-color:#3a2020;}
.pri.hi.on,.pri.hi:hover{background:#2e1a1a;border-color:var(--red);}
.pri.med{color:var(--yellow);border-color:var(--yellow);background:#2a2010;}
.pri.lo{color:var(--sky);border-color:#1e2a3a;}
.pri.lo.on,.pri.lo:hover{background:#1a2535;border-color:var(--sky);}

.date-group{display:flex;gap:7px;flex:1;min-width:220px;}
.date-wrap{
  display:flex;align-items:center;gap:6px;
  background:#0f1219;border:1.5px solid var(--b1);
  border-radius:9px;padding:6px 10px;flex:1;
  transition:border-color .15s;
}
.date-wrap:focus-within{border-color:var(--accent);}
.date-lbl{
  font-size:9.5px;color:var(--muted);font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
input[type=date]{
  background:transparent;border:none;outline:none;
  color:#8892b0;font-size:11.5px;font-family:'DM Sans',sans-serif;
  width:100%;cursor:pointer;color-scheme:dark;padding:0;
}
input[type=date]::-webkit-calendar-picker-indicator{
  filter:invert(.35);cursor:pointer;margin-left:2px;
}

.add-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--accent);border:none;color:#fff;
  font-size:22px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;line-height:1;
  padding-bottom:1px;font-family:'DM Sans',sans-serif;
}
.add-btn:hover{background:var(--accent2);transform:scale(1.06);}
.add-btn:active{transform:scale(.96);}

/* ─── TOOLBAR ─────────────────────────────────────────── */
.toolbar{
  display:flex;gap:8px;align-items:center;
  margin-bottom:18px;flex-wrap:wrap;
}
.filter-btn{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--b1);color:var(--muted);
  background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.filter-btn.on{border-color:var(--accent);color:var(--accent2);background:rgba(91,124,250,.1);}
.filter-btn:hover:not(.on){border-color:var(--b2);color:var(--text);}

.search-wrap{
  display:flex;align-items:center;gap:8px;flex:1;min-width:160px;
  background:var(--s1);border:1.5px solid var(--b1);
  border-radius:9px;padding:6px 12px;transition:border-color .15s;
}
.search-wrap:focus-within{border-color:var(--b2);}
.search-wrap svg{flex-shrink:0;opacity:.4;}
.search-wrap input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-size:12.5px;font-family:'DM Sans',sans-serif;
  width:100%;
}
.search-wrap input::placeholder{color:var(--faint);}

.sort-btn{
  padding:6px 12px;border-radius:9px;font-size:12px;
  background:var(--s1);border:1.5px solid var(--b1);
  color:var(--muted);cursor:pointer;transition:all .15s;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
}
.sort-btn:hover{border-color:var(--b2);color:var(--text);}

/* ─── TASK LIST ───────────────────────────────────────── */
.section-title{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  color:var(--faint);letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:11px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--b1);}

.task{
  background:var(--s1);border:1.5px solid var(--b1);
  border-radius:var(--r);padding:14px 16px;
  margin-bottom:9px;display:flex;align-items:flex-start;gap:12px;
  transition:all .2s;position:relative;overflow:hidden;
  animation:fadeUp .22s ease;
}
.task::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;border-radius:3px 0 0 3px;
}
.task.hi::before{background:var(--red);}
.task.med::before{background:var(--yellow);}
.task.lo::before{background:var(--sky);}
.task:hover{border-color:var(--b2);}
.task.done{opacity:.4;}
.task.overdue{border-color:rgba(248,113,113,.25);}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(-6px);}
  to{opacity:1;transform:translateY(0);}
}

.check{
  width:20px;height:20px;border-radius:6px;
  border:2px solid var(--b2);background:transparent;
  cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:#fff;font-size:11px;
}
.check:hover{border-color:var(--green);}
.check.on{background:var(--green);border-color:var(--green);}

.task-body{flex:1;min-width:0;}
.task-title{
  font-family:'Syne',sans-serif;font-weight:600;font-size:14px;
  color:var(--text);margin-bottom:7px;line-height:1.4;
  transition:color .15s;word-break:break-word;
}
.task.done .task-title{text-decoration:line-through;color:var(--muted);}

.task-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.m-tag{
  font-size:10.5px;font-weight:500;padding:2px 9px;border-radius:12px;
  background:rgba(91,124,250,.12);color:var(--accent2);white-space:nowrap;
}
.m-date{
  font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:3px;white-space:nowrap;
}
.m-date.late{color:var(--red);}
.synced-badge{
  font-size:10px;color:var(--green);
  display:flex;align-items:center;gap:3px;
  background:rgba(52,211,153,.1);padding:2px 8px;border-radius:10px;
  cursor:pointer;white-space:nowrap;
}
.synced-badge:hover{background:rgba(52,211,153,.2);}

.task-actions{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.act{
  width:28px;height:28px;border-radius:7px;border:none;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .15s;
}
.act:hover{background:var(--s2);}
.act.sync{color:var(--accent);}
.act.sync:hover{background:rgba(91,124,250,.15);}
.act.del:hover{background:#2e1a1a;color:var(--red);}
.act.edit:hover{background:var(--s3);color:var(--text);}

/* ─── EMPTY ───────────────────────────────────────────── */
.empty{
  text-align:center;padding:52px 20px;color:var(--muted);
}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.35;}
.empty-text{font-size:14px;line-height:1.6;}

/* ─── MODAL ───────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:100;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
  padding:20px;
}
.overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--s1);border:1.5px solid var(--b2);
  border-radius:20px;padding:28px;width:400px;max-width:100%;
  transform:scale(.95) translateY(8px);transition:transform .22s;
  max-height:90vh;overflow-y:auto;
}
.overlay.show .modal{transform:scale(1) translateY(0);}
.modal-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.modal-head-icon{font-size:28px;}
.modal-head-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
.modal-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px;}

/* GCal setup steps */
.steps{display:flex;flex-direction:column;gap:12px;margin-bottom:22px;}
.step{
  background:var(--s2);border:1.5px solid var(--b1);
  border-radius:10px;padding:14px 16px;
  display:flex;gap:12px;align-items:flex-start;
}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.step-body{}
.step-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.step-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.step-code{
  background:#0f1219;border:1px solid var(--b2);
  border-radius:6px;padding:6px 10px;font-size:11px;
  color:var(--accent2);font-family:monospace;margin-top:6px;
  word-break:break-all;
}

.modal-input{
  width:100%;background:var(--s2);border:1.5px solid var(--b2);
  border-radius:10px;padding:10px 14px;
  color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;margin-bottom:12px;transition:border-color .15s;
}
.modal-input:focus{border-color:var(--accent);}
.modal-input::placeholder{color:var(--faint);}

.modal-actions{display:flex;gap:10px;}
.mbtn{
  flex:1;padding:11px;border-radius:11px;font-size:14px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--b2);font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.mbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.mbtn.primary:hover{background:var(--accent2);}
.mbtn.danger{background:#2e1a1a;border-color:var(--red);color:var(--red);}
.mbtn.danger:hover{background:#3a2020;}
.mbtn.ghost{background:transparent;color:var(--muted);}
.mbtn.ghost:hover{color:var(--text);border-color:var(--b2);}

/* Edit modal fields */
.edit-field{margin-bottom:14px;}
.edit-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}

/* ─── TOAST ───────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--s2);border:1.5px solid var(--b2);
  border-radius:13px;padding:11px 20px;
  font-size:13px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  opacity:0;transition:all .28s;pointer-events:none;
  z-index:200;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);}
.toast.warn{border-color:var(--yellow);}
.toast.err{border-color:var(--red);}

/* ─── PROGRESS BAR ────────────────────────────────────── */
.progress-wrap{margin-bottom:22px;}
.progress-meta{
  display:flex;justify-content:space-between;
  font-size:12px;color:var(--muted);margin-bottom:7px;
}
.progress-bar{
  height:4px;background:var(--b1);border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--sky));
  border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* ─── SYNC PANEL ──────────────────────────────────────── */
.sync-panel{
  background:var(--s1);border:1.5px solid rgba(52,211,153,.25);
  border-radius:var(--r);padding:14px 16px;margin-bottom:20px;
  display:none;
}
.sync-panel.show{display:block;}
.sync-panel-head{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.sync-panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--green);}
.sync-actions{display:flex;gap:8px;flex-wrap:wrap;}
.sync-act-btn{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;border:1.5px solid rgba(52,211,153,.3);
  color:var(--green);background:rgba(52,211,153,.08);
  transition:all .15s;font-family:'DM Sans',sans-serif;
}
.sync-act-btn:hover{background:rgba(52,211,153,.15);}

/* ─── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .header{flex-direction:column;gap:12px;align-items:flex-start;}
  .date-group{min-width:100%;margin-top:8px;}
  .controls{flex-wrap:wrap;}
  .toolbar{gap:6px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ─────────────────────────────────────── -->
  <div class="header">
    <div>
      <div class="logo">Task<span>Flow</span></div>
      <div class="logo-sub">Smart Task Manager</div>
    </div>
    <div class="header-right">
      <div class="user-avatar" id="avatar"></div>
      <button class="gcal-pill" id="gcalPill" onclick="openGCalModal()">
        <div class="gcal-dot" id="gcalDot"></div>
        <svg class="gcal-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3 9h18" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span id="gcalLabel">Connect Calendar</span>
      </button>
    </div>
  </div>

  <!-- ── STATS ──────────────────────────────────────── -->
  <div class="stats" id="statsRow"></div>

  <!-- ── PROGRESS ───────────────────────────────────── -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">Today's progress</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- ── SYNC PANEL ─────────────────────────────────── -->
  <div class="sync-panel" id="syncPanel">
    <div class="sync-panel-head">
      <span>🗓</span>
      <span class="sync-panel-title">Google Calendar Connected</span>
      <span style="font-size:11px;color:var(--muted);margin-left:auto" id="syncUser"></span>
    </div>
    <div class="sync-actions">
      <button class="sync-act-btn" onclick="syncAllToGCal()">↑ Sync all unsynced</button>
      <button class="sync-act-btn" onclick="importFromGCal()">↓ Import from Calendar</button>
      <button class="sync-act-btn" onclick="refreshGCalTokens()">⟳ Refresh auth</button>
    </div>
  </div>

  <!-- ── INPUT CARD ─────────────────────────────────── -->
  <div class="input-card">
    <div class="input-hint">What needs to get done?</div>
    <input class="task-input" id="taskInput" placeholder="Add a new task…" onkeydown="if(event.key==='Enter')addTask()"/>

    <div class="chip-row" id="tagChips">
      <button class="chip" onclick="toggleTag(this,'Work')">Work</button>
      <button class="chip" onclick="toggleTag(this,'Personal')">Personal</button>
      <button class="chip" onclick="toggleTag(this,'Urgent')">Urgent</button>
      <button class="chip" onclick="toggleTag(this,'Health')">Health</button>
      <button class="chip" onclick="toggleTag(this,'Finance')">Finance</button>
      <button class="chip" onclick="toggleTag(this,'Learning')">Learning</button>
    </div>

    <div class="sep"></div>

    <div class="controls">
      <button class="pri hi" onclick="setPri('hi')">● Hi</button>
      <button class="pri med on" onclick="setPri('med')">● Med</button>
      <button class="pri lo" onclick="setPri('lo')">● Lo</button>

      <div class="date-group">

<script>
/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let tasks    = JSON.parse(localStorage.getItem('tf_tasks4') || '[]');
let gcal     = JSON.parse(localStorage.getItem('tf_gcal4')  || 'null'); // {accessToken,refreshToken,expiry,email,clientId,clientSecret}
let filter   = 'all';
let sortMode = 'newest'; // newest | oldest | priority | due
let selTags  = [];
let selPri   = 'med';
let editId   = null;
let editTags = [];
let editPri  = 'med';
let toastTmr;

const SORT_CYCLE = ['newest','oldest','priority','due'];
const PRI_ORDER  = {hi:0,med:1,lo:2};

/* ═══════════════════════════════════════════════════════
   PERSIST
═══════════════════════════════════════════════════════ */
function save(){
  localStorage.setItem('tf_tasks4', JSON.stringify(tasks));
  localStorage.setItem('tf_gcal4',  JSON.stringify(gcal));
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  updateGCalUI();
  render();

  // Handle OAuth callback from popup
  window.addEventListener('message', handleOAuthMessage);
});

/* ═══════════════════════════════════════════════════════
   TAG / PRIORITY
═══════════════════════════════════════════════════════ */
function toggleTag(el, tag){
  if(selTags.includes(tag)){
    selTags = selTags.filter(t=>t!==tag);
    el.classList.remove('on');
  } else {
    selTags.push(tag);
    el.classList.add('on');
  }
}
function setPri(p){
  selPri = p;
  document.querySelectorAll('.input-card .pri').forEach(b=>b.classList.remove('on'));
  document.querySelector('.input-card .pri.'+p).classList.add('on');
}

/* ═══════════════════════════════════════════════════════
   ADD TASK
═══════════════════════════════════════════════════════ */
function addTask(){
  const inp = document.getElementById('taskInput');
  const title = inp.value.trim();
  if(!title){ inp.focus(); toast('Type a task first','warn'); return; }

  const startDate = document.getElementById('startDate').value;
  const dueDate   = document.getElementById('dueDate').value;

  const task = {
    id:        Date.now(),
    title,
    tags:      [...selTags],
    priority:  selPri,
    startDate,
    dueDate,
    done:      false,
    synced:    false,
    gcalId:    null,
    calUrl:    null,
    createdAt: new Date().toISOString()
  };

  tasks.unshift(task);

  // Auto-sync if connected
  if(gcal && dueDate){
    pushToGCal(task).then(()=>{ save(); render(); });
  } else {
    save(); render();
  }

  // Reset
  inp.value = '';
  document.getElementById('startDate').value = '';
  document.getElementById('dueDate').value   = '';
  selTags = [];
  document.querySelectorAll('#tagChips .chip').forEach(c=>c.classList.remove('on'));
  setPri('med');

  toast('✓ Task added' + (gcal&&dueDate ? ' & synced' : ''), 'ok');
  inp.focus();
}

/* ═══════════════════════════════════════════════════════
   EDIT
═══════════════════════════════════════════════════════ */
function openEdit(id){
  editId = id;
  const t = tasks.find(t=>t.id===id);
  if(!t) return;

  document.getElementById('editTitle').value = t.title;
  document.getElementById('editStart').value = t.startDate||'';
  document.getElementById('editDue').value   = t.dueDate||'';

  editTags = [...t.tags];
  document.querySelectorAll('#editTags .chip').forEach(c=>{
    c.classList.toggle('on', editTags.includes(c.textContent.trim()));
  });

  editPri = t.priority;
  ['hi','med','lo'].forEach(p=>{
    document.getElementById('e'+p.charAt(0).toUpperCase()+p.slice(1)).classList.toggle('on',p===editPri);
  });

  document.getElementById('editOverlay').classList.add('show');
}
function toggleEditTag(el,tag){
  if(editTags.includes(tag)){ editTags=editTags.filter(t=>t!==tag); el.classList.remove('on'); }
  else { editTags.push(tag); el.classList.add('on'); }
}
function editPri(p){
  editPri = p;
  ['hi','med','lo'].forEach(q=>{
    document.getElementById('e'+q.charAt(0).toUpperCase()+q.slice(1)).classList.toggle('on',q===p);
  });
}
function closeEdit(){ document.getElementById('editOverlay').classList.remove('show'); }
function saveEdit(){
  const t = tasks.find(t=>t.id===editId);
  if(!t) return;
  t.title     = document.getElementById('editTitle').value.trim() || t.title;
  t.tags      = [...editTags];
  t.priority  = editPri;
  t.startDate = document.getElementById('editStart').value;
  t.dueDate   = document.getElementById('editDue').value;
  t.synced    = false; // mark dirty
  save(); render(); closeEdit();
  toast('Task updated','ok');
}

/* ═══════════════════════════════════════════════════════
   DONE / DELETE
═══════════════════════════════════════════════════════ */
function toggleDone(id){
  const t = tasks.find(t=>t.id===id);
  if(t){ t.done=!t.done; save(); render(); }
}
function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  tasks = tasks.filter(t=>t.id!==id);
  save(); render();
  toast('Task deleted','');
}

/* ═══════════════════════════════════════════════════════
   FILTER / SORT / SEARCH
═══════════════════════════════════════════════════════ */
function setFilter(f,btn){
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function cycleSort(){
  const idx = SORT_CYCLE.indexOf(sortMode);
  sortMode = SORT_CYCLE[(idx+1)%SORT_CYCLE.length];
  const labels = {newest:'Newest',oldest:'Oldest',priority:'Priority',due:'Due Date'};
  document.getElementById('sortLabel').textContent = labels[sortMode];
  render();
}
function getFiltered(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let out = tasks.filter(t=>{
    if(q && !t.title.toLowerCase().includes(q) && !t.tags.join(' ').toLowerCase().includes(q)) return false;
    if(filter==='active')  return !t.done;
    if(filter==='done')    return t.done;
    if(filter==='overdue') return !t.done && isOverdue(t);
    if(filter==='synced')  return t.synced;
    return true;
  });
  // Sort
  if(sortMode==='oldest')   out.sort((a,b)=>a.id-b.id);
  if(sortMode==='priority') out.sort((a,b)=>(PRI_ORDER[a.priority]||1)-(PRI_ORDER[b.priority]||1));
  if(sortMode==='due')      out.sort((a,b)=>{
    if(!a.dueDate) return 1; if(!b.dueDate) return -1;
    return new Date(a.dueDate)-new Date(b.dueDate);
  });
  return out;
}
function isOverdue(t){
  if(!t.dueDate||t.done) return false;
  return new Date(t.dueDate+'T00:00:00') < new Date(new Date().toDateString());
}
function fmtDate(s){
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-SG',{day:'numeric',month:'short'});
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function render(){
  renderStats();
  renderProgress();
  renderList();
}
function renderStats(){
  const total   = tasks.length;
  const done    = tasks.filter(t=>t.done).length;
  const overdue = tasks.filter(t=>isOverdue(t)).length;
  const synced  = tasks.filter(t=>t.synced).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-val blue">${total}</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val green">${done}</div><div class="stat-lbl">Done</div></div>
    <div class="stat"><div class="stat-val red">${overdue}</div><div class="stat-lbl">Overdue</div></div>
    <div class="stat"><div class="stat-val yellow">${synced}</div><div class="stat-lbl">Synced</div></div>
  `;
}
function renderProgress(){
  const active = tasks.filter(t=>!t.done).length;
  const done   = tasks.filter(t=>t.done).length;
  const total  = tasks.length;
  const pct    = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent  = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} tasks complete`;
}
function renderList(){
  const list = document.getElementById('taskList');
  const data = getFiltered();
  document.getElementById('sectionTitle').textContent = data.length+' task'+(data.length!==1?'s':'');

  if(!data.length){
    list.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">No tasks here.<br>Add one above to get started.</div></div>`;
    return;
  }

  list.innerHTML = data.map(t=>`
    <div class="task ${t.priority} ${t.done?'done':''} ${isOverdue(t)?'overdue':''}">
      <button class="check ${t.done?'on':''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</button>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          ${t.tags.map(g=>`<span class="m-tag">${g}</span>`).join('')}
          ${t.startDate?`<span class="m-date">▶ ${fmtDate(t.startDate)}</span>`:''}
          ${t.dueDate?`<span class="m-date ${isOverdue(t)?'late':''}">⬛ ${fmtDate(t.dueDate)}${isOverdue(t)?' ⚠':''}</span>`:''}
          ${t.synced?`<span class="synced-badge" onclick="openSyncedEvent(${t.id})" title="View in Google Calendar">🗓 Calendar</span>`:''}
        </div>
      </div>
      <div class="task-actions">
        <button class="act sync" onclick="manualSync(${t.id})" title="${t.synced?'Re-sync':'Sync to Calendar'}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M1 7h14" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 1v3M11 1v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="act edit" onclick="openEdit(${t.id})" title="Edit">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M11 2l3 3L5 14H2v-3L11 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="act del" onclick="deleteTask(${t.id})" title="Delete">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M6 4V2h4v2M5 4l.5 10h5L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   GOOGLE CALENDAR — OAUTH PKCE FLOW
═══════════════════════════════════════════════════════ */
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/userinfo.email';

async function startGCalOAuth(){
  const clientId = document.getElementById('clientIdInput').value.trim();
  const clientSecret = document.getElementById('clientSecretInput').value.trim();
  if(!clientId){ toast('Enter your Client ID','warn'); return; }
  if(!clientSecret){ toast('Enter your Client Secret','warn'); return; }

  gcal = { clientId, clientSecret };
  save();

  // PKCE code_verifier + code_challenge
  const verifier  = generateVerifier();
  const challenge = await pkceChallenge(verifier);
  sessionStorage.setItem('gcal_verifier', verifier);

  const redirectUri = window.location.origin + '/oauth-callback.html';
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('gcal_state', state);

  const params = new URLSearchParams({
    client_id:             clientId,
    redirect_uri:          redirectUri,
    response_type:         'code',
    scope:                 GCAL_SCOPES,
    access_type:           'offline',
    prompt:                'consent',
    state:                 state,
    code_challenge:        challenge,
    code_challenge_method: 'S256'
  });

  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();

  // Open popup
  const popup = window.open(authUrl, 'gcal_oauth', 'width=520,height=620,menubar=no,toolbar=no');
  if(!popup){ toast('Allow popups for this site','warn'); return; }

  closeGCalModal();
  toast('Authorize in the popup window…','');
}

function generateVerifier(){
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function pkceChallenge(verifier){
  const enc = new TextEncoder();
  const data = enc.encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function handleOAuthMessage(e){
  if(e.origin !== window.location.origin) return;
  if(!e.data || e.data.type !== 'gcal_oauth') return;

  const { code, state, error } = e.data;
  if(error){ toast('Auth failed: '+error,'err'); return; }

  const savedState = sessionStorage.getItem('gcal_state');
  if(state !== savedState){ toast('State mismatch – retry','err'); return; }

  const verifier = sessionStorage.getItem('gcal_verifier');
  await exchangeCodeForToken(code, verifier);
}

async function exchangeCodeForToken(code, verifier){
  toast('Connecting to Google…','');
  const redirectUri = window.location.origin + '/oauth-callback.html';

  try {
    const res = await fetch('https://oauth2.googleapis.com/token', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        code,
        client_id:     gcal.clientId,
        client_secret: gcal.clientSecret,
        redirect_uri:  redirectUri,
        grant_type:    'authorization_code',
        code_verifier: verifier
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error_description || data.error);

    gcal.accessToken  = data.access_token;
    gcal.refreshToken = data.refresh_token || gcal.refreshToken;
    gcal.expiry       = Date.now() + (data.expires_in - 60) * 1000;

    // Get user email
    const info = await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{
      headers:{ Authorization: 'Bearer '+gcal.accessToken }
    });
    const user = await info.json();
    gcal.email = user.email;

    save();
    updateGCalUI();
    render();

    // Auto-sync unsynced tasks with due dates
    let count = 0;
    for(const t of tasks){ if(!t.synced && t.dueDate){ await pushToGCal(t); count++; } }
    save(); render();
    toast(`🗓 Connected as ${gcal.email}${count?' — '+count+' task(s) synced':''}`, 'ok');

  } catch(err){
    toast('Connection failed: '+err.message,'err');
  }
}

async function ensureFreshToken(){
  if(!gcal) return false;
  if(gcal.expiry && Date.now() < gcal.expiry) return true;
  if(!gcal.refreshToken){ toast('Session expired — please reconnect','err'); gcal.accessToken=null; save(); updateGCalUI(); return false; }

  try {
    const res = await fetch('https://oauth2.googleapis.com/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        refresh_token: gcal.refreshToken,
        client_id:     gcal.clientId,
        client_secret: gcal.clientSecret,
        grant_type:    'refresh_token'
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    gcal.accessToken = data.access_token;
    gcal.expiry      = Date.now() + (data.expires_in - 60)*1000;
    save();
    return true;
  } catch(err){
    toast('Token refresh failed','err');
    return false;
  }
}

function disconnectGCal(){
  if(!confirm('Disconnect Google Calendar?')) return;
  gcal = null;
  tasks.forEach(t=>{ t.synced=false; t.gcalId=null; t.calUrl=null; });
  save(); updateGCalUI(); render(); closeGCalModal();
  toast('Disconnected from Google Calendar','');
}

function refreshGCalTokens(){ ensureFreshToken().then(ok=>{ if(ok) toast('Auth refreshed','ok'); }); }

/* ═══════════════════════════════════════════════════════
   GOOGLE CALENDAR — CRUD
═══════════════════════════════════════════════════════ */
async function pushToGCal(task){
  const ok = await ensureFreshToken();
  if(!ok) return;

  const startDate = task.startDate || task.dueDate;
  const endDate   = task.dueDate   || task.startDate;

  const nextDay = d => {
    const dt = new Date(d+'T00:00:00');
    dt.setDate(dt.getDate()+1);
    return dt.toISOString().split('T')[0];
  };

  const body = {
    summary:     task.title,
    description: [
      task.tags.length ? 'Tags: '+task.tags.join(', ') : '',
      'Priority: '+task.priority,
      'Created by TaskFlow'
    ].filter(Boolean).join('\n'),
    start: { date: startDate },
    end:   { date: nextDay(endDate) },
    colorId: task.priority==='hi' ? '11' : task.priority==='med' ? '5' : '7'
  };

  try {
    const method = task.gcalId ? 'PUT' : 'POST';
    const url    = task.gcalId
      ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${task.gcalId}`
      : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;

    const res = await fetch(url, {
      method,
      headers:{
        'Authorization':'Bearer '+gcal.accessToken,
        'Content-Type':'application/json'
      },
      body: JSON.stringify(body)
    });

    if(res.status===401){ gcal.expiry=0; return pushToGCal(task); }
    if(!res.ok) throw new Error('HTTP '+res.status);

    const ev = await res.json();
    task.synced = true;
    task.gcalId = ev.id;
    task.calUrl = ev.htmlLink;

  } catch(err){
    console.error('GCal push error',err);
  }
}

async function deleteFromGCal(task){
  if(!task.gcalId || !gcal) return;
  const ok = await ensureFreshToken();
  if(!ok) return;
  await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${task.gcalId}`,{
    method:'DELETE',
    headers:{ 'Authorization':'Bearer '+gcal.accessToken }
  });
}

async function manualSync(id){
  const t = tasks.find(t=>t.id===id);
  if(!t) return;
  if(!gcal){ openGCalModal(); return; }
  if(!t.dueDate && !t.startDate){ toast('Add a date first','warn'); return; }

  toast('Syncing…','');
  await pushToGCal(t);
  save(); render();
  toast(t.synced ? '🗓 Synced to Google Calendar' : 'Sync failed – check console','ok');
}

async function syncAllToGCal(){
  if(!gcal){ toast('Connect Google Calendar first','warn'); return; }
  const unsynced = tasks.filter(t=>!t.synced && (t.dueDate||t.startDate));
  if(!unsynced.length){ toast('All tasks already synced','ok'); return; }

  toast(`Syncing ${unsynced.length} task(s)…`,'');
  for(const t of unsynced) await pushToGCal(t);
  save(); render();
  toast(`🗓 Synced ${unsynced.length} task(s)`,'ok');
}

async function importFromGCal(){
  const ok = await ensureFreshToken();
  if(!ok) return;
  toast('Importing from Google Calendar…','');

  try {
    const now  = new Date();
    const min  = now.toISOString();
    const max  = new Date(now.setMonth(now.getMonth()+3)).toISOString();

    const res  = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(min)}&timeMax=${encodeURIComponent(max)}&singleEvents=true&maxResults=50`,{
      headers:{ 'Authorization':'Bearer '+gcal.accessToken }
    });
    const data = await res.json();
    if(!data.items) throw new Error('No items');

    let added = 0;
    for(const ev of data.items){
      if(tasks.some(t=>t.gcalId===ev.id)) continue;
      if(!ev.summary) continue;

      tasks.unshift({
        id:        Date.now()+Math.random(),
        title:     ev.summary,
        tags:      [],
        priority:  'med',
        startDate: ev.start?.date || ev.start?.dateTime?.split('T')[0] || '',
        dueDate:   ev.end?.date   || ev.end?.dateTime?.split('T')[0]   || '',
        done:      false,
        synced:    true,
        gcalId:    ev.id,
        calUrl:    ev.htmlLink,
        createdAt: ev.created || new Date().toISOString()
      });
      added++;
    }
    save(); render();
    toast(`↓ Imported ${added} event(s) from Calendar`, 'ok');
  } catch(err){
    toast('Import failed: '+err.message,'err');
  }
}

function openSyncedEvent(id){
  const t = tasks.find(t=>t.id===id);
  if(t&&t.calUrl) window.open(t.calUrl,'_blank');
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
function toast(msg, type){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type?' '+type:'');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(()=>el.classList.remove('show'), 3200);
}
